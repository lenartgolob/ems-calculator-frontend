server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  location = /calculator {
    return 301 /calculator/;
  }

  location /calculator/ {
    rewrite ^/calculator/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
